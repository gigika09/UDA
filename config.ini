<?xml version="1.0" encoding="UTF-8"?>
<!--
    build.xml — Apache Ant build file per NetBeans
    ════════════════════════════════════════════════════════════════════
    NetBeans legge questo file per sapere come compilare, eseguire
    e confezionare il progetto.

    Target principali (richiamabili anche da riga di comando con "ant"):
      ant clean      → elimina la cartella build/ e dist/
      ant compile    → compila i sorgenti in build/classes/
      ant jar        → crea dist/GestioneRimborsi.jar
      ant run        → avvia l'applicazione
      ant            → default: esegue clean + compile + jar
    ════════════════════════════════════════════════════════════════════
-->
<project name="GestioneRimborsi" default="default" basedir=".">

    <!-- ── Descrizione del progetto ──────────────────────────────────── -->
    <description>Gestione Rimborsi Spese Dipendenti — Progetto NetBeans/Ant</description>

    <!-- ── Import del file di build NetBeans (genera target standard) ── -->
    <!--
        NetBeans genera automaticamente nbproject/build-impl.xml con
        centinaia di target riutilizzabili. Questo file li importa tutti
        e aggiunge solo le personalizzazioni necessarie.
    -->
    <import file="nbproject/build-impl.xml"/>

    <!-- ── Target "default": pulisce, compila e crea il JAR ─────────── -->
    <target name="default" depends="clean,jar"
            description="Compila e crea il JAR distribuibile"/>

</project>
