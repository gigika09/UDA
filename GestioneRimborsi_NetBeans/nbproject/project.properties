# ════════════════════════════════════════════════════════════════════════════
# project.properties — Proprietà Ant lette da build-impl.xml
#
# Ogni riga "chiave=valore" definisce una variabile Ant.
# NetBeans usa queste proprietà per sapere dove trovare i sorgenti,
# dove mettere i .class compilati, quale classe avviare, ecc.
# ════════════════════════════════════════════════════════════════════════════

# ── Cartelle principali ───────────────────────────────────────────────────

annotation.processing.enabled=true
annotation.processing.enabled.in.editor=false
annotation.processing.processors.list=
annotation.processing.run.all.processors=true
application.title=GestioneRimborsi
application.vendor=angyf
build.generated.sources.dir=${build.dir}/generated-sources
debug.modulepath=\
    ${run.modulepath}
debug.test.modulepath=\
    ${run.test.modulepath}
endorsed.classpath=
javac.deprecation=false
javac.external.vm=false
javac.modulepath=
javac.processormodulepath=
javac.processorpath=\
    ${javac.classpath}
javac.test.classpath=
javac.test.modulepath=\
    ${javac.modulepath}
javadoc.html5=false
jlink.launcher=false
jlink.launcher.name=GestioneRimborsi
mkdist.disabled=false
run.modulepath=\
    ${javac.modulepath}
run.test.classpath=
run.test.modulepath=\
    ${javac.test.modulepath}
# Cartella dei sorgenti Java
src.dir=src

# Cartella dei test JUnit (vuota nel nostro progetto)
test.src.dir=test

# Cartella dove Ant mette i .class compilati
build.dir=build

# Cartella dove Ant mette il JAR finale
dist.dir=dist

# Sottocartelle di build (generate automaticamente da Ant)
build.classes.dir=${build.dir}/classes
build.test.classes.dir=${build.dir}/test/classes
build.test.results.dir=${build.dir}/test/results

# ── JAR e classe principale ────────────────────────────────────────────────

# Nome del file JAR prodotto da "ant jar"
dist.jar=${dist.dir}/GestioneRimborsi.jar

# Classe con il metodo main (senza estensione .java)
main.class=RimborsiUDA

# ── Compilazione ──────────────────────────────────────────────────────────

# Versione sorgente Java (compatibile con Java 8+)
javac.source=17
javac.target=17

# Mostra tutti i warning del compilatore
javac.compilerargs=-Xlint:unchecked

# Encoding dei file sorgente
source.encoding=UTF-8

# ── Classpath ─────────────────────────────────────────────────────────────

# Librerie esterne (nessuna nel nostro progetto: solo JDK standard)
javac.classpath=
run.classpath=

# ── Esecuzione ────────────────────────────────────────────────────────────

# Directory di lavoro quando si avvia l'app da NetBeans (Run → Run Project)
# "." = cartella radice del progetto, dove si trovano spese.csv e config.ini
run.dir=${basedir}

# Argomenti JVM opzionali (vuoti per default)
run.jvmargs=

# ── JAR manifest ─────────────────────────────────────────────────────────

# Aggiunge attributo Main-Class al MANIFEST.MF nel JAR
# → permette di eseguire il JAR con: java -jar GestioneRimborsi.jar
jar.compress=false
manifest.file=nbproject/manifest.mf

# ── Javadoc ───────────────────────────────────────────────────────────────

javadoc.additionalparam=
javadoc.author=true
javadoc.encoding=${source.encoding}
javadoc.noindex=false
javadoc.nonavbar=false
javadoc.notree=false
javadoc.private=false
javadoc.splitindex=true
javadoc.use=true
javadoc.version=true
javadoc.windowtitle=GestioneRimborsi

# ── Altre proprietà richieste da NetBeans ─────────────────────────────────

platform.active=default_platform
includes=**
excludes=
